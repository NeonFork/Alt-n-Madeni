<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleFeed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .instagram-gradient { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">

    <!-- Uygulama Çerçevesi (Mobil Görünüm) -->
    <div class="w-full max-w-md bg-white relative shadow-2xl flex flex-col h-screen overflow-hidden">
        
        <!-- GİRİŞ EKRANI -->
        <div id="login-view" class="flex flex-col items-center justify-center h-full px-8 z-20 bg-white absolute w-full transition-opacity duration-300">
            <h1 class="text-4xl font-semibold mb-8 italic">TeleFeed</h1>
            <div class="w-full space-y-4">
                <input type="text" id="api-id" placeholder="API ID" class="w-full bg-gray-50 border border-gray-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:border-gray-400">
                <input type="text" id="api-hash" placeholder="API Hash" class="w-full bg-gray-50 border border-gray-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:border-gray-400">
                <input type="tel" id="phone" placeholder="Telefon Numarası (+90...)" class="w-full bg-gray-50 border border-gray-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:border-gray-400">
                <button onclick="loginToTelegram()" class="w-full bg-blue-500 text-white font-semibold rounded-lg py-3 mt-2 hover:bg-blue-600 transition">Giriş Yap</button>
            </div>
            <p class="text-xs text-gray-400 text-center mt-6">my.telegram.org adresinden API bilgilerini alabilirsin.</p>
        </div>

        <!-- ANA AKIŞ EKRANI -->
        <div id="feed-view" class="hidden flex-col h-full w-full opacity-0 transition-opacity duration-500">
            
            <!-- Üst Navigasyon -->
            <header class="flex justify-between items-center px-4 py-3 border-b border-gray-200 bg-white z-10">
                <h1 class="text-xl font-semibold italic">TeleFeed</h1>
                <div class="flex space-x-4 text-xl">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-brands fa-telegram"></i>
                </div>
            </header>

            <!-- İçerik Alanı (Kaydırılabilir) -->
            <main class="flex-1 overflow-y-auto pb-16 no-scrollbar bg-white">
                
                <!-- Kanallar (Hikayeler Formatı) -->
                <div class="flex overflow-x-auto space-x-4 px-4 py-3 border-b border-gray-200 no-scrollbar" id="channels-container">
                    <!-- JS ile doldurulacak -->
                </div>

                <!-- Gönderiler (Feed) -->
                <div class="flex flex-col" id="posts-container">
                    <!-- JS ile doldurulacak -->
                </div>
            </main>

            <!-- Alt Navigasyon -->
            <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 px-6 py-3 flex justify-between text-2xl z-10">
                <i class="fa-solid fa-house cursor-pointer"></i>
                <i class="fa-solid fa-magnifying-glass text-gray-400 cursor-pointer"></i>
                <i class="fa-regular fa-square-plus text-gray-400 cursor-pointer"></i>
                <i class="fa-solid fa-clapperboard text-gray-400 cursor-pointer"></i>
                <div class="w-7 h-7 rounded-full bg-gray-300 overflow-hidden border border-gray-300 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
                </div>
            </nav>
        </div>
    </div>

    <script>
        // DOM Elementleri
        const loginView = document.getElementById('login-view');
        const feedView = document.getElementById('feed-view');
        const channelsContainer = document.getElementById('channels-container');
        const postsContainer = document.getElementById('posts-container');

        // Örnek Veriler (API entegre edilene kadar arayüzü test etmek için)
        const mockChannels = [
            { id: 1, name: "Teknoloji", img: "https://picsum.photos/100?random=1" },
            { id: 2, name: "Tasarım", img: "https://picsum.photos/100?random=2" },
            { id: 3, name: "Haberler", img: "https://picsum.photos/100?random=3" },
            { id: 4, name: "Yazılım", img: "https://picsum.photos/100?random=4" },
            { id: 5, name: "Müzik", img: "https://picsum.photos/100?random=5" }
        ];

        const mockPosts = [
            {
                channelName: "Teknoloji",
                channelImg: "https://picsum.photos/100?random=1",
                image: "https://picsum.photos/600/600?random=10",
                text: "Yeni yapay zeka modelleri açıklandı. Sektörde büyük bir değişim bekleniyor. #teknoloji #ai",
                likes: "1.2 B",
                time: "2 SAAT ÖNCE"
            },
            {
                channelName: "Tasarım",
                channelImg: "https://picsum.photos/100?random=2",
                image: "https://picsum.photos/600/600?random=11",
                text: "Minimalist arayüzlerin yükselişi. Boşluk (whitespace) kullanımı neden bu kadar önemli? 👇",
                likes: "856",
                time: "5 SAAT ÖNCE"
            }
        ];

        // Telegram Giriş Simülasyonu
        function loginToTelegram() {
            // Buraya GramJS auth mekanizması gelecek.
            // Örnek: const client = new TelegramClient(session, apiId, apiHash, { connectionRetries: 5 });
            // await client.start({ phoneNumber: phone, password: () => ... });

            // Simüle edilmiş geçiş
            loginView.style.opacity = '0';
            setTimeout(() => {
                loginView.classList.add('hidden');
                feedView.classList.remove('hidden');
                feedView.classList.add('flex');
                setTimeout(() => feedView.style.opacity = '1', 50);
                
                renderChannels();
                renderPosts();
            }, 300);
        }

        // Kanalları "Hikayeler" formatında render etme
        function renderChannels() {
            channelsContainer.innerHTML = mockChannels.map(channel => `
                <div class="flex flex-col items-center space-y-1 min-w-[70px] cursor-pointer">
                    <div class="w-16 h-16 rounded-full p-[2px] instagram-gradient">
                        <img src="${channel.img}" class="w-full h-full rounded-full border-2 border-white object-cover" alt="${channel.name}">
                    </div>
                    <span class="text-xs truncate w-full text-center">${channel.name}</span>
                </div>
            `).join('');
        }

        // Telegram mesajlarını "Instagram Gönderisi" formatında render etme
        function renderPosts() {
            postsContainer.innerHTML = mockPosts.map(post => `
                <article class="border-b border-gray-200 pb-4">
                    <!-- Gönderi Başlığı (Kanal Bilgisi) -->
                    <div class="flex items-center justify-between px-4 py-3">
                        <div class="flex items-center space-x-3 cursor-pointer">
                            <img src="${post.channelImg}" class="w-8 h-8 rounded-full object-cover border border-gray-200">
                            <span class="text-sm font-semibold">${post.channelName}</span>
                        </div>
                        <i class="fa-solid fa-ellipsis text-gray-500 cursor-pointer"></i>
                    </div>

                    <!-- Gönderi Medyası -->
                    ${post.image ? `<img src="${post.image}" class="w-full h-auto object-cover max-h-[500px]">` : ''}

                    <!-- Etkileşim Butonları -->
                    <div class="px-4 py-3">
                        <div class="flex justify-between items-center mb-2 text-xl">
                            <div class="flex space-x-4">
                                <i class="fa-regular fa-heart cursor-pointer hover:text-gray-500"></i>
                                <i class="fa-regular fa-comment cursor-pointer hover:text-gray-500"></i>
                                <i class="fa-regular fa-paper-plane cursor-pointer hover:text-gray-500"></i>
                            </div>
                            <i class="fa-regular fa-bookmark cursor-pointer hover:text-gray-500"></i>
                        </div>
                        
                        <div class="text-sm font-semibold mb-1">${post.likes} beğenme</div>
                        
                        <!-- Mesaj Metni -->
                        <div class="text-sm mb-1">
                            <span class="font-semibold cursor-pointer">${post.channelName}</span> 
                            ${post.text}
                        </div>
                        
                        <div class="text-[10px] text-gray-400 mt-2 tracking-wide">${post.time}</div>
                    </div>
                </article>
            `).join('');
        }
    </script>
</body>
</html>
